name: SharedLedger
options:
  bundleIdPrefix: com.shaunchuang
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  SharedLedger:
    type: application
    platform: iOS
    sources:
      - path: SharedLedger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shaunchuang.SharedLedger
        PRODUCT_NAME: SharedLedger
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Shared Ledger
        INFOPLIST_KEY_NSCONTACTSUSAGEDESCRIPTION: 選擇要邀請加入共享記帳群組的聯絡人。
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: SharedLedger/SharedLedger.entitlements
    scheme:
      testTargets:
        - SharedLedgerTests
  SharedLedgerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SharedLedgerTests
    dependencies:
      - target: SharedLedger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shaunchuang.SharedLedgerTests
        GENERATE_INFOPLIST_FILE: YES

