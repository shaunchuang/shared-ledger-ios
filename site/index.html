<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <meta name="description" content="Shared Ledger 官方資訊頁">
  <title>Shared Ledger</title>
  <style>
    :root {
      color-scheme: light dark;
      --background: #f4f7f5;
      --surface: #ffffff;
      --text: #14241e;
      --muted: #5f6f68;
      --accent: #176b52;
      --border: #d7e1dc;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --background: #0d1512;
        --surface: #15201c;
        --text: #eff8f3;
        --muted: #adbbb4;
        --accent: #74d9b4;
        --border: #2d3c36;
      }
    }

    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--background);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(620px, 100%);
      padding: clamp(32px, 8vw, 64px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      text-align: center;
    }
    h1 { margin: 0 0 12px; font-size: clamp(2.25rem, 10vw, 4rem); }
    p { color: var(--muted); line-height: 1.7; }
    a {
      display: inline-block;
      margin-top: 18px;
      padding: 12px 20px;
      border-radius: 999px;
      background: var(--accent);
      color: var(--background);
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Shared Ledger</h1>
    <p>為家庭、伴侶、室友與旅行團設計的共享記帳 App。</p>
    <a href="./privacy/">查看隱私權政策</a>
  </main>
</body>
</html>
