name: iOS CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-for-testing:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Build app and tests
        run: >-
          xcodebuild build-for-testing
          -project SharedLedger.xcodeproj
          -scheme SharedLedger
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO
